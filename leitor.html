<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leitor de Documentos - CONADSI 2026</title>
    <link rel="stylesheet" href="src/page/leitor/leitor.css" />
</head>
<body>
    <div class="interface-leitor">
        <main class="container-leitor">
            <div class="cartao-leitor">
                <div class="camera-header">
                    <div class="titulo-leitor">Leitor de QR Code</div>
                </div>

                <div class="camera-card">
                    <div class="camera-frame">
                        <video id="video-scanner" autoplay playsinline webkit-playsinline muted></video>
                    </div>
                    <div id="mensagem-scanner" class="mensagem-scanner">Aguardando QR code...</div>
                </div>

                <button id="botao-iniciar-scanner-visivel" class="botao-primario">🎥 Abrir câmera</button>
                <button id="botao-trocar-camera" class="botao-secundario oculto">🔁 Trocar câmera</button>

                <button id="botao-voltar" class="botao-primario">Voltar</button>
            </div>
        </main>

        <div class="oculto-ids" aria-hidden="true">
            <div class="scanner-controls">
                <button id="botao-iniciar-scanner" class="botao-ferramenta">🎥 Iniciar câmera</button>
                <button id="botao-parar-scanner" class="botao-ferramenta" disabled>⏹ Parar câmera</button>
            </div>

            <input 
                type="file" 
                id="entrada-arquivo" 
                class="entrada-arquivo"
                accept=".pdf,.docx,.txt,.jpg,.png"
            />
            <button id="botao-zoom-aumentar" class="botao-ferramenta"></button>
            <button id="botao-zoom-diminuir" class="botao-ferramenta"></button>
            <button id="botao-rotacionar" class="botao-ferramenta"></button>
            <button id="botao-download" class="botao-ferramenta" disabled></button>
            <button id="botao-pagina-anterior" class="botao-pagina"></button>
            <button id="botao-proxima-pagina" class="botao-pagina"></button>
            <span id="pagina-atual"></span>
            <span id="total-paginas"></span>
            <div id="area-documento"></div>
            <span id="info-nome-doc"></span>
            <span id="info-tipo-doc"></span>
            <span id="info-tamanho-doc"></span>
            <span id="info-data-doc"></span>
            <textarea id="area-anotacoes"></textarea>
            <button id="botao-salvar-anotacoes"></button>
            <span id="usuario-leitor-info"></span>
            <div id="lista-documentos"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script type="module" src="src/page/leitor/leitor.js"></script>
</body>
</html>
